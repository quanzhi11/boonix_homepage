<!doctype html>
<html lang="zh-cn">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>404 - 页面未找到</title>
	<link rel="icon" href="pic/booxin.png" type="image/png">
	<style>
    /* 全局样式重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 深色科技风颜色变量 */
    :root {
      --bg-dark: #0a0e27;
      --bg-card: rgba(16, 24, 40, 0.95);
      --bg-card-hover: rgba(20, 30, 50, 0.98);
      --accent-primary: #00f5ff;
      --accent-secondary: #ff00e5;
      --accent-tertiary: #7b61ff;
      --text-primary: #e0e7ff;
      --text-secondary: #9ca3af;
      --text-accent: #00f5ff;
      --border-color: rgba(0, 245, 255, 0.2);
      --shadow: 0 8px 32px rgba(0, 245, 255, 0.15);
      --shadow-hover: 0 16px 48px rgba(0, 245, 255, 0.25);
      --radius: 20px;
      --radius-sm: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 基础样式 */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow-x: hidden;
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 动态背景效果 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 245, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 0, 229, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(123, 97, 255, 0.08) 0%, transparent 50%),
        linear-gradient(135deg, rgba(10, 14, 39, 0.95) 0%, rgba(16, 24, 40, 0.95) 100%);
      z-index: -2;
      animation: backgroundShift 20s ease-in-out infinite;
    }

    /* 网格背景 */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(0, 245, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
      opacity: 0.5;
      animation: gridMove 30s linear infinite;
    }

    /* 背景动画 */
    @keyframes backgroundShift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(10px, 10px) rotate(1deg); }
      50% { transform: translate(-10px, 10px) rotate(-1deg); }
      75% { transform: translate(-10px, -10px) rotate(1deg); }
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(30px, 30px); }
    }

    /* 主容器 */
    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
      position: relative;
      text-align: center;
    }

    /* 404主内容 */
    .error-container {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      padding: 60px 40px;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out;
    }

    /* 装饰条 */
    .error-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary), var(--accent-primary));
      background-size: 200% 100%;
      animation: gradientSlide 4s linear infinite;
    }

    @keyframes gradientSlide {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 404数字 */
    .error-number {
      font-size: 160px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
      line-height: 1;
      position: relative;
      display: inline-block;
    }

    .error-number::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 245, 255, 0.1) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      z-index: -1;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.4; }
    }

    /* 错误标题 */
    .error-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    /* 错误描述 */
    .error-description {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 40px;
      line-height: 1.8;
    }

    /* 按钮组 */
    .error-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* 按钮样式 */
    .btn {
      padding: 14px 32px;
      border: 2px solid var(--border-color);
      background: transparent;
      color: var(--accent-primary);
      border-radius: var(--radius-sm);
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-size: 16px;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(0, 245, 255, 0.1);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover {
      background: rgba(0, 245, 255, 0.1);
      border-color: var(--accent-primary);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 245, 255, 0.2);
    }

    .btn:hover::before {
      width: 400px;
      height: 400px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: var(--bg-dark);
      border-color: transparent;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
      box-shadow: var(--shadow-hover);
    }

    /* 页脚 */
    footer {
      margin-top: 40px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    footer a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 700;
      transition: var(--transition);
      position: relative;
      padding-bottom: 2px;
    }

    footer a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent-primary);
      transition: width 0.3s ease;
    }

    footer a:hover {
      color: var(--accent-secondary);
    }

    footer a:hover::after {
      width: 100%;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .wrap {
        padding: 24px 16px;
      }

      .error-container {
        padding: 40px 24px;
      }

      .error-number {
        font-size: 120px;
      }

      .error-number::after {
        width: 200px;
        height: 200px;
      }

      .error-title {
        font-size: 28px;
      }

      .error-description {
        font-size: 15px;
      }

      .error-buttons {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .error-number {
        font-size: 80px;
      }

      .error-number::after {
        width: 150px;
        height: 150px;
      }

      .error-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="error-container">
      <div class="error-number">404</div>
      <h1 class="error-title">页面未找到</h1>
      <p class="error-description">
        很抱歉，您访问的页面不存在或已被移动。
        <br>
        可能是您输入的网址有误，或者该页面已被删除。
      </p>
      <div class="error-buttons">
        <a href="index.html" class="btn btn-primary">返回首页</a>
        <a href="help.html" class="btn">查看帮助</a>
      </div>
    </div>
    <footer>
      <p>© 2024 Booxin Launcher. All rights reserved. | <a href="index.html">返回首页</a></p>
      <p><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">浙ICP备2026008378号</a></p>
    </footer>
  </div>
</body>
</html>
